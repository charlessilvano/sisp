<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orçamentador SISP Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'media',
            theme: { 
                extend: {
                    fontFamily: {
                        sans: ['"Google Sans Flex"', 'sans-serif'],
                    }
                } 
            }
        }
    </script>
    <style>
        @font-face {
            font-family: 'Google Sans Flex';
            font-style: normal;
            font-weight: 100 1000;
            src: url('https://cdn.jsdelivr.net/fontsource/fonts/google-sans-flex:vf@latest/latin-wght-normal.woff2') format('woff2-variations');
        }
        body { font-family: 'Google Sans Flex', sans-serif; }
        .gantt-bar { height: 24px; border-radius: 4px; transition: width 0.3s ease; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 min-h-screen transition-colors duration-300">

    <div class="max-w-6xl mx-auto p-4 md:p-8">
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-bold">Orçamentador <span class="text-blue-600">SISP</span></h1>
                <p class="text-gray-500 dark:text-gray-400">Composição de Custos e Planejamento</p>
            </div>
            <div class="flex gap-2">
                <button onclick="changeTab('budget')" class="px-4 py-2 rounded-lg bg-blue-100 dark:bg-blue-900 text-blue-700 dark:text-blue-200">Orçamento</button>
                <button onclick="changeTab('gantt')" class="px-4 py-2 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-800">Gantt</button>
                <button onclick="exportToPDF()" class="px-4 py-2 rounded-lg bg-red-600 text-white hover:bg-red-700">PDF</button>
            </div>
        </header>

        <main id="app-content">
            <!-- View: Orçamento -->
            <section id="view-budget" class="space-y-6">
                <div class="bg-white dark:bg-gray-900 p-6 rounded-2xl shadow-sm border border-gray-200 dark:border-gray-800">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl font-semibold">Itens do Serviço (Base UST)</h2>
                        <button onclick="openModal()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">+ Adicionar Item</button>
                    </div>
                    
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead>
                                <tr class="border-b dark:border-gray-700">
                                    <th class="p-3">Serviço</th>
                                    <th class="p-3">Qtd</th>
                                    <th class="p-3">Valor (UST)</th>
                                    <th class="p-3">Total</th>
                                    <th class="p-3">Ações</th>
                                </tr>
                            </thead>
                            <tbody id="budget-list"></tbody>
                        </table>
                    </div>
                </div>
            </section>

            <!-- View: Gantt -->
            <section id="view-gantt" class="hidden space-y-6">
                <div class="bg-white dark:bg-gray-900 p-6 rounded-2xl shadow-sm border border-gray-200 dark:border-gray-800">
                    <h2 class="text-xl font-semibold mb-6">Cronograma de Execução</h2>
                    <div id="gantt-container" class="space-y-4"></div>
                </div>
            </section>
        </main>
    </div>

    <div id="modal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white dark:bg-gray-900 p-6 rounded-2xl w-full max-w-md border dark:border-gray-800">
            <h3 class="text-xl font-bold mb-4">Novo Item SISP</h3>
            <div class="space-y-4">
                <input id="in-name" placeholder="Nome do Serviço" class="w-full p-3 rounded-lg border dark:bg-gray-800 dark:border-gray-700">
                <div class="grid grid-cols-2 gap-4">
                    <input id="in-qty" type="number" placeholder="Quantidade" class="w-full p-3 rounded-lg border dark:bg-gray-800 dark:border-gray-700">
                    <input id="in-price" type="number" placeholder="Valor UST" class="w-full p-3 rounded-lg border dark:bg-gray-800 dark:border-gray-700">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <input id="in-start" type="date" class="w-full p-3 rounded-lg border dark:bg-gray-800 dark:border-gray-700">
                    <input id="in-end" type="date" class="w-full p-3 rounded-lg border dark:bg-gray-800 dark:border-gray-700">
                </div>
            </div>
            <div class="flex justify-end gap-2 mt-6">
                <button onclick="closeModal()" class="px-4 py-2 text-gray-500">Cancelar</button>
                <button onclick="saveItem()" class="px-4 py-2 bg-blue-600 text-white rounded-lg">Salvar</button>
            </div>
        </div>
    </div>

    <script>
        let items = JSON.parse(localStorage.getItem('orcamento_sisp')) || [];

        function render() {
            const list = document.getElementById('budget-list');
            list.innerHTML = items.map((i, idx) => `
                <tr class="dark:border-gray-700 pt-2">
                    <td class="p-3 pb-1">${i.name}</td>
                    <td class="p-3 pb-1">${i.qty}</td>
                    <td class="p-3 pb-1">${i.price}</td>
                    <td class="p-3 pb-1 font-bold">${(i.qty * i.price).toFixed(2)}</td>
                    <td class="p-3 pb-1 text-red-500 cursor-pointer hover:underline" onclick="deleteItem(${idx})">Remover</td>
                </tr>
                <tr class="border-b dark:border-gray-700">
                    <td colspan="5" class="px-3 pb-3 pt-0">
                        <textarea 
                            placeholder="Descreva o que será feito neste serviço..." 
                            class="w-full p-2 mt-1 text-sm text-gray-700 dark:text-gray-300 bg-gray-50 rounded-lg border border-gray-200 dark:border-gray-700 dark:bg-gray-800/50 focus:ring-2 focus:ring-blue-500 outline-none resize-y transition-colors"
                            onchange="updateDescription(${idx}, this.value)"
                            rows="2"
                        >${i.description || ''}</textarea>
                    </td>
                </tr>
            `).join('');
            
            const gantt = document.getElementById('gantt-container');
            gantt.innerHTML = items.map(i => `
                <div>
                    <div class="text-sm font-medium mb-1">${i.name}</div>
                    <div class="w-full bg-gray-200 dark:bg-gray-800 h-6 rounded-lg overflow-hidden">
                        <div class="gantt-bar bg-blue-500" style="width: 100%"></div>
                    </div>
                </div>
            `).join('');
        }

        function saveItem() {
            const name = document.getElementById('in-name').value;
            const qty = document.getElementById('in-qty').value;
            const price = document.getElementById('in-price').value;
            const start = document.getElementById('in-start').value;
            const end = document.getElementById('in-end').value;

            if(name && qty && price) {
                items.push({ name, qty, price, start, end });
                localStorage.setItem('orcamento_sisp', JSON.stringify(items));
                closeModal();
                render();
            }
        }

        function deleteItem(idx) {
            items.splice(idx, 1);
            localStorage.setItem('orcamento_sisp', JSON.stringify(items));
            render();
        }

        function updateDescription(idx, value) {
            items[idx].description = value;
            localStorage.setItem('orcamento_sisp', JSON.stringify(items));
        }

        function changeTab(tab) {
            document.getElementById('view-budget').classList.toggle('hidden', tab !== 'budget');
            document.getElementById('view-gantt').classList.toggle('hidden', tab !== 'gantt');
        }

        function openModal() { document.getElementById('modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        function exportToPDF() {
            const element = document.getElementById('app-content');
            html2pdf().from(element).set({
                margin: 10,
                filename: 'Orcamento_SISP.pdf',
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            }).save();
        }

        render();
    </script>
</body>
</html>
